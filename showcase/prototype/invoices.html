  <script>
    // Invoice data
    const invoices = [
      { id: '1047', customer: 'Matas A/S', date: '15.04.2026', due: '29.04.2026', amount: '12.500,00', status: 'pending' },
      { id: '1046', customer: 'Novo Nordisk A/S', date: '14.04.2026', due: '28.04.2026', amount: '85.000,00', status: 'paid' },
      { id: '1045', customer: 'Vestas Wind Systems', date: '13.04.2026', due: '27.04.2026', amount: '145.000,00', status: 'paid' },
      { id: '1044', customer: 'Carlsberg A/S', date: '12.04.2026', due: '26.04.2026', amount: '28.750,00', status: 'overdue' },
      { id: '1043', customer: 'Maersk A/S', date: '11.04.2026', due: '25.04.2026', amount: '230.000,00', status: 'paid' },
      { id: '1042', customer: 'DSV Panalpina', date: '10.04.2026', due: '24.04.2026', amount: '67.200,00', status: 'pending' },
      { id: '1041', customer: 'Coloplast A/S', date: '09.04.2026', due: '23.04.2026', amount: '33.450,00', status: 'overdue' },
      { id: '1040', customer: 'Pandora A/S', date: '08.04.2026', due: '22.04.2026', amount: '19.800,00', status: 'paid' },
      { id: '1039', customer: 'Orsted A/S', date: '07.04.2026', due: '21.04.2026', amount: '112.500,00', status: 'pending' },
      { id: '1038', customer: 'Demant A/S', date: '06.04.2026', due: '20.04.2026', amount: '45.600,00', status: 'overdue' },
      { id: '1037', customer: 'Tryg A/S', date: '05.04.2026', due: '19.04.2026', amount: '78.300,00', status: 'paid' },
      { id: '1036', customer: 'GN Audio A/S', date: '04.04.2026', due: '18.04.2026', amount: '56.100,00', status: 'paid' },
      { id: '1035', customer: 'ISS A/S', date: '03.04.2026', due: '17.04.2026', amount: '92.000,00', status: 'pending' },
      { id: '1034', customer: 'FLSmidth A/S', date: '02.04.2026', due: '16.04.2026', amount: '41.250,00', status: 'overdue' },
      { id: '1033', customer: 'Rockwool A/S', date: '01.04.2026', due: '15.04.2026', amount: '63.800,00', status: 'paid' },
    ];

    const statusMap = {
      paid: { label: 'Betalt', bg: 'bg-[#CDF0E7]', text: 'text-[#08AE87]' },
      pending: { label: 'Afventer', bg: 'bg-[#FFF1C3]', text: 'text-[#FFBD3B]' },
      overdue: { label: 'Forfalden', bg: 'bg-[#FFDAD2]', text: 'text-[#CE3F42]' }
    };

    const tbody = document.getElementById('table-body');

    function renderTable(data) {
      tbody.innerHTML = data.map(inv => {
        const s = statusMap[inv.status];
        return `<tr class="group/row hover:bg-[#FAFAFA] shadow-[inset_0_-1px_0_0_#DDDDDD]">
          <td class="px-2 py-2 text-center"><input type="checkbox" class="row-cb w-4 h-4 rounded border-[#ACACAC] cursor-pointer accent-[#4573D2]" data-id="${inv.id}" /></td>
          <td class="px-3 py-2"><a href="create-invoice.html" class="text-[#4573D2] hover:text-[#2B57B4]">${inv.id}</a></td>
          <td class="px-3 py-2"><a href="customer.html" class="hover:text-[#4573D2]">${inv.customer}</a></td>
          <td class="px-3 py-2">${inv.date}</td>
          <td class="px-3 py-2">${inv.due}</td>
          <td class="px-3 py-2 text-right">${inv.amount}</td>
          <td class="px-3 py-2"><span class="inline-flex items-center px-2 py-0.5 rounded-[4px] text-xs ${s.bg} ${s.text}">${s.label}</span></td>
          <td class="px-2 py-2">
            <div class="flex items-center justify-end gap-0.5 opacity-0 group-hover/row:opacity-100 transition-opacity">
              <button class="inline-flex items-center justify-center w-8 h-8 rounded-[4px] hover:bg-[#EBEBEB]" aria-label="Edit" title="Rediger">
                <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M20.25 20.5a.75.75 0 110 1.5H3.75a.75.75 0 110-1.5h16.5zM16.013 2.927a1.75 1.75 0 012.35-.114l.124.114 1.586 1.586a1.75 1.75 0 01.114 2.35l-.114.124L8.061 19H4v-4.06L16.013 2.926zM14.499 6.56l-8.999 9v1.94h1.938l9-9-1.939-1.94zm2.928-2.573a.25.25 0 00-.3-.04l-.054.04L15.56 5.5l1.939 1.94 1.514-1.512a.25.25 0 00.065-.24l-.025-.06-.04-.054-1.586-1.586z" fill-rule="evenodd"/></svg>
              </button>
              <button class="inline-flex items-center justify-center w-8 h-8 rounded-[4px] hover:bg-[#EBEBEB]" aria-label="Copy" title="Kopier">
                <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5v1.5h-.25a.25.25 0 00-.243.193L5.5 6.75v13.5a.25.25 0 00.193.243l.057.007h9.5a.25.25 0 00.243-.193l.007-.057V20H17v.25A1.75 1.75 0 0115.25 22h-9.5A1.75 1.75 0 014 20.25V6.75C4 5.784 4.784 5 5.75 5H6zm7.586-3a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707v8.836A1.75 1.75 0 0118.25 19h-9.5A1.75 1.75 0 017 17.25V3.75C7 2.784 7.784 2 8.75 2h4.836zM13 3.5H8.75a.25.25 0 00-.243.193L8.5 3.75v13.5a.25.25 0 00.193.243l.057.007h9.5a.25.25 0 00.243-.193l.007-.057V9h-3.75a1.75 1.75 0 01-1.744-1.606L13 7.25V3.5zm1.5 1.121V7.25a.25.25 0 00.193.243l.057.007h2.629L14.5 4.621z" fill-rule="evenodd"/></svg>
              </button>
              <button class="inline-flex items-center justify-center w-8 h-8 rounded-[4px] hover:bg-[#EBEBEB]" aria-label="Delete" title="Slet">
                <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a4.5 4.5 0 014.472 4h3.778a.75.75 0 110 1.5h-.75V18a4 4 0 01-4 4h-7a4 4 0 01-4-4V7.5h-.75a.75.75 0 010-1.5h3.777A4.5 4.5 0 0112 2zm6 5.5H6V18a2.5 2.5 0 002.336 2.495l.164.005h7a2.5 2.5 0 002.495-2.336L18 18V7.5zm-8.25 2a.75.75 0 01.75.75v7.5a.75.75 0 11-1.5 0v-7.5a.75.75 0 01.75-.75zm4.5 0a.75.75 0 01.75.75v7.5a.75.75 0 11-1.5 0v-7.5a.75.75 0 01.75-.75zM12 3.5A3 3 0 009.041 6h5.917A3 3 0 0012 3.5z" fill-rule="evenodd"/></svg>
              </button>
            </div>
          </td>
        </tr>`;
      }).join('');
      bindCheckboxes();
    }

    renderTable(invoices);

    // Sorting
    const sortUpIcon = '<svg class="w-6 h-6" viewBox="0 0 24 24" fill="#1C1C1C"><path fill-rule="evenodd" clip-rule="evenodd" d="M6.20711 15.5C5.76165 15.5 5.53857 14.9614 5.85355 14.6464L11.6464 8.85355C11.8417 8.65829 12.1583 8.65829 12.3536 8.85355L18.1464 14.6464C18.4614 14.9614 18.2383 15.5 17.7929 15.5H6.20711Z" /></svg>';
    const sortDownIcon = '<svg class="w-6 h-6" viewBox="0 0 24 24" fill="#1C1C1C"><path fill-rule="evenodd" clip-rule="evenodd" d="M6.20711 8.5C5.76165 8.5 5.53857 9.03857 5.85355 9.35355L11.6464 15.1464C11.8417 15.3417 12.1583 15.3417 12.3536 15.1464L18.1464 9.35355C18.4614 9.03857 18.2383 8.5 17.7929 8.5H6.20711Z" /></svg>';

    document.querySelectorAll('th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        let sort = th.dataset.sort;
        // Reset all
        document.querySelectorAll('th[data-col]').forEach(h => {
          h.dataset.sort = 'none';
          h.querySelector('.sort-icon').innerHTML = '';
        });
        const newSort = sort === 'asc' ? 'desc' : 'asc';
        th.dataset.sort = newSort;
        th.querySelector('.sort-icon').innerHTML = newSort === 'asc' ? sortUpIcon : sortDownIcon;

        const sorted = [...invoices].sort((a, b) => {
          let va, vb;
          if (col === '0') { va = parseInt(a.id); vb = parseInt(b.id); }
          else if (col === '1') { va = a.customer; vb = b.customer; }
          else if (col === '2') { va = a.date; vb = b.date; }
          else if (col === '3') { va = a.due; vb = b.due; }
          else if (col === '4') { va = parseFloat(a.amount.replace(/\./g,'').replace(',','.')); vb = parseFloat(b.amount.replace(/\./g,'').replace(',','.')); }
          if (typeof va === 'string') return newSort === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
          return newSort === 'asc' ? va - vb : vb - va;
        });
        renderTable(sorted);
      });
    });

    // Checkbox selection
    function bindCheckboxes() {
      const rowCbs = document.querySelectorAll('.row-cb');
      const selectAll = document.getElementById('select-all');
      const selCount = document.getElementById('selected-count');
      const selNum = document.getElementById('sel-num');

      selectAll.addEventListener('change', () => {
        rowCbs.forEach(cb => cb.checked = selectAll.checked);
        updateCount();
      });
      rowCbs.forEach(cb => cb.addEventListener('change', updateCount));

      function updateCount() {
        const checked = document.querySelectorAll('.row-cb:checked').length;
        if (checked > 0) {
          selCount.classList.remove('hidden');
          selNum.textContent = checked;
        } else {
          selCount.classList.add('hidden');
        }
      }
    }

    // Search
    document.getElementById('search-input').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      const filtered = invoices.filter(inv =>
        inv.id.includes(q) || inv.customer.toLowerCase().includes(q) || inv.amount.includes(q) || statusMap[inv.status].label.toLowerCase().includes(q)
      );
      renderTable(filtered);
    });

    // Filter toggle
    document.getElementById('filter-toggle').addEventListener('click', function() {
      this.classList.toggle('border-[#4573D2]');
      this.classList.toggle('text-[#4573D2]');
    });

    // Agreement dropdown
    const agreeBtn = document.getElementById('agreement-btn');
    const agreeDd = document.getElementById('agreement-dropdown');
    const agreeChev = document.getElementById('agreement-chevron');
    agreeBtn.addEventListener('click', () => { agreeDd.classList.toggle('hidden'); agreeChev.classList.toggle('rotate-180'); });
    document.addEventListener('click', e => {
      if (!document.getElementById('agreement-wrapper').contains(e.target)) { agreeDd.classList.add('hidden'); agreeChev.classList.remove('rotate-180'); }
    });
    agreeDd.querySelectorAll('div').forEach(opt => opt.addEventListener('click', () => {
      agreeBtn.querySelector('span').textContent = opt.textContent.trim();
      agreeDd.classList.add('hidden');
      agreeChev.classList.remove('rotate-180');
    }));
  </script>
</body>
</html>
